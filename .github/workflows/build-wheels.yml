name: Build Pi Zero W Wheels

on:
  push:
    paths:
      - requirements.txt
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for ARMv6 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Build wheels for linux/arm/v6
        run: |
          mkdir -p wheels
          docker run --rm \
            --platform linux/arm/v6 \
            -v ${{ github.workspace }}/wheels:/wheels \
            -v ${{ github.workspace }}/requirements.txt:/req.txt:ro \
            python:3.11-slim \
            pip wheel --prefer-binary -r /req.txt -w /wheels

      - name: Commit wheels
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wheels/
          git diff --staged --quiet || git commit -m "chore: update prebuilt wheels for Pi Zero W"
          git push
